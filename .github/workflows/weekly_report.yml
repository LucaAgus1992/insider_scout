name: Insider Buying — Weekly Report
 
on:
  schedule:
    # Ogni lunedi alle 07:00 UTC (09:00 ora italiana)
    - cron: "0 7 * * 1"
 
  # Bottone per eseguire manualmente dalla tab Actions
  workflow_dispatch:
 
jobs:
  run-scout:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        run: pip install requests beautifulsoup4
 
      - name: Run Insider Scout
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python insider_scout.py
 
